version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartheal_postgres
    environment:
      POSTGRES_DB: smartheal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartheal_network

volumes:
  postgres_data:
    driver: local

networks:
  smartheal_network:
    driver: bridge
